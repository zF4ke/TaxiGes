<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Definir Preços</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="priceForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Preço por minuto (Básico) €</mat-label>
          <input matInput type="number" placeholder="Ex: 0.25" formControlName="precoBasico">
          <mat-error *ngIf="priceForm.get('precoBasico')?.hasError('required')">
            Preço básico é obrigatório
          </mat-error>
          <mat-error *ngIf="priceForm.get('precoBasico')?.hasError('min')">
            Não pode ser um valor negativo
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Preço por minuto (Luxo) €</mat-label>
          <input matInput type="number" placeholder="Ex: 0.50" formControlName="precoLuxo">
          <mat-error *ngIf="priceForm.get('precoLuxo')?.hasError('required')">
            Preço luxo é obrigatório
          </mat-error>
          <mat-error *ngIf="priceForm.get('precoLuxo')?.hasError('min')">
            Não pode ser um valor negativo
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Agravamento no período noturno (%)</mat-label>
          <input matInput type="number" placeholder="Ex: 20" formControlName="agravamento">
          <mat-error *ngIf="priceForm.get('agravamento')?.hasError('required')">
            Agravamento é obrigatório
          </mat-error>
          <mat-error *ngIf="priceForm.get('agravamento')?.hasError('min')">
            Não pode ser um valor negativo
          </mat-error>
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="!priceForm.valid">
            Salvar Preços
          </button>
          <button mat-button type="button" routerLink="/list-price">Cancelar</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
