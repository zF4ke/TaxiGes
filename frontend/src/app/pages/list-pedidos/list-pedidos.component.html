<!-- src/app/pages/list-pedidos/list-pedidos.component.html -->

<div class="list-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Pedidos de Táxi</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="pedidos" class="mat-elevation-z8">
        <!-- Nº Pessoas -->
        <ng-container matColumnDef="numeroPessoas">
          <th mat-header-cell *matHeaderCellDef>Nº Pessoas</th>
          <td mat-cell *matCellDef="let p">{{ p.numeroPessoas }}</td>
        </ng-container>

        <!-- Origem -->
        <ng-container matColumnDef="localizacaoAtual">
          <th mat-header-cell *matHeaderCellDef>Origem</th>
          <td mat-cell *matCellDef="let p">
            {{ p.localizacaoAtual.rua }}, {{ p.localizacaoAtual.localidade }}
          </td>
        </ng-container>

        <!-- Destino -->
        <ng-container matColumnDef="destino">
          <th mat-header-cell *matHeaderCellDef>Destino</th>
          <td mat-cell *matCellDef="let p">
            {{ p.destino.rua }}, {{ p.destino.localidade }}
          </td>
        </ng-container>

        <!-- Conforto -->
        <ng-container matColumnDef="nivelConforto">
          <th mat-header-cell *matHeaderCellDef>Conforto</th>
          <td mat-cell *matCellDef="let p">{{ p.nivelConforto }}</td>
        </ng-container>

        <!-- Ações -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let p">
            <button
              mat-icon-button
              color="primary"
              (click)="accept(p._id!)"
              matTooltip="Aceitar pedido">
              <mat-icon>check_circle</mat-icon>
            </button>
            <button
              mat-icon-button
              color="accent"
              (click)="viewDetails(p._id!)"
              matTooltip="Ver detalhes">
              <mat-icon>info</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['numeroPessoas','localizacaoAtual','destino','nivelConforto','actions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['numeroPessoas','localizacaoAtual','destino','nivelConforto','actions'];"></tr>
      </table>

      <div *ngIf="pedidos.length === 0" class="no-data">
        Não há pedidos pendentes.
      </div>
    </mat-card-content>
  </mat-card>
</div>
