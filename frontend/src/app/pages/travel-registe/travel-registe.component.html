<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Registar Viagem</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="travelForm">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Origem</mat-label>
          <input matInput formControlName="origem" readonly />
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Destino</mat-label>
          <input matInput formControlName="destino" readonly />
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Data</mat-label>
          <input matInput formControlName="data" type="date" readonly />
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Hora</mat-label>
          <input matInput formControlName="hora" type="time" readonly />
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Nº de Passageiros</mat-label>
          <input matInput formControlName="passageiros" type="number" min="1" />
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Status do Pedido</mat-label>
          <input matInput 
            [value]="viagem?.status || '---'" 
            readonly
            class="status"
            [ngClass]="{
              'por-iniciar': viagem?.status === 'por iniciar',
              'iniciada': viagem?.status === 'iniciada',
              'finalizada': viagem?.status === 'finalizada'
            }"
          />
        </mat-form-field>

        <div class="button-group">
          <button mat-raised-button color="primary" type="button" (click)="onRegistarEntrada()">Registar entrada dos passageiros</button>
          <button mat-button type="button" (click)="voltarAtras()">
            Voltar atrás
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
