<div class="login-container">
    <h2>Acesso do Motorista</h2>
  
    <div class="form-section">
      <h3>Aceder com NIF</h3>
      <form #nifForm="ngForm" (ngSubmit)="onSubmitNIF(nifForm)">
        <div class="form-group">
          <label for="nif">NIF:</label>
          <input
            type="text"
            id="nif"
            name="nif"
            ngModel  #nifInput="ngModel" placeholder="Digite os 9 dígitos do seu NIF"
            required pattern="^\d{9}$" maxlength="9" />
          <div *ngIf="nifInput.invalid && (nifInput.dirty || nifInput.touched)" class="error-messages">
            <div *ngIf="nifInput.errors?.['required']">O NIF é obrigatório.</div>
            <div *ngIf="nifInput.errors?.['pattern']">O NIF deve conter exatamente 9 dígitos numéricos.</div>
          </div>
        </div>
        <button type="submit" [disabled]="nifForm.invalid">Aceder com NIF</button>
      </form>
    </div>
  
    <hr />
  
    <div class="list-section">
      <h3>Ou selecione a sua conta</h3>
      <div *ngIf="motoristasParaSelecao && motoristasParaSelecao.length > 0; else noMotoristas">
        <label for="motoristaSelect">Escolha o seu nome:</label>
        <select id="motoristaSelect" name="selectedMotorista" (change)="onSelectMotorista($event)">
          <option value="">-- Selecione um motorista --</option> <option *ngFor="let motorista of motoristasParaSelecao" [value]="motorista._id">
            {{ motorista.nome }} (NIF: {{ motorista.NIF }})
          </option>
        </select>
      </div>
      <ng-template #noMotoristas>
        <p>A carregar lista de motoristas ou nenhum motorista disponível...</p>
      </ng-template>
    </div>
  
    <div *ngIf="errorMessage" class="error-messages global-error">
      {{ errorMessage }}
    </div>
  </div>
