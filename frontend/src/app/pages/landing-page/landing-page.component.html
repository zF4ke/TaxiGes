<div class="landing-container">
  <mat-card class="welcome-card">
    <mat-card-header>
      <mat-card-title>Bem-vindo ao TaxiGes</mat-card-title>
      <mat-card-subtitle>Sistema de Gestão de Táxis</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>Este sistema permite gerir a sua frota de táxis de forma eficiente.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" routerLink="/add-taxi">
        <mat-icon>add</mat-icon>
        Adicionar Táxi
      </button>
      <button mat-raised-button color="accent" routerLink="/list-taxis">
        <mat-icon>list</mat-icon>
        Ver Táxis
      </button>
    </mat-card-actions>
  </mat-card>
</div>
