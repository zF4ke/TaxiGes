<div class="form-container">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Editar Preço</mat-card-title>
      </mat-card-header>
      <mat-card-content>
  
        <form [formGroup]="priceForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline">
            <mat-label>Preço por minuto</mat-label>
            <input matInput type="number" placeholder="Ex: 0.25" formControlName="precoPorMinuto">
            <mat-error *ngIf="priceForm.get('precoPorMinuto')?.hasError('required')">
              Preço por minuto é obrigatório
            </mat-error>
            <mat-error *ngIf="priceForm.get('precoPorMinuto')?.hasError('min')">
              Não pode ser um valor negativo
            </mat-error>
          </mat-form-field>
  
          <mat-form-field appearance="outline">
            <mat-label>Agravamento no período noturno</mat-label>
            <input matInput type="number" placeholder="Ex: 20" formControlName="agravamento">
            <mat-error *ngIf="priceForm.get('agravamento')?.hasError('required')">
              Agravamento é obrigatório
            </mat-error>
            <mat-error *ngIf="priceForm.get('agravamento')?.hasError('min')">
              Não pode ser um valor negativo
            </mat-error>
          </mat-form-field>
  
          <mat-form-field appearance="outline">
            <mat-label>Tipo de Conforto</mat-label>
            <input matInput type="text" formControlName="tipo">
          </mat-form-field>
  
          <div class="actions">
            <button mat-raised-button color="primary" type="submit" [disabled]="!priceForm.valid">
              Atualizar Preço
            </button>
            <button mat-button type="button" routerLink="/list-prices">Cancelar</button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
