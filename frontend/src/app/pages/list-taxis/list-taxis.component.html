<div class="list-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Lista de Táxis</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-progress-bar *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>
      
      <table mat-table [dataSource]="taxis" class="mat-elevation-z8" *ngIf="!isLoading">
        <ng-container matColumnDef="matricula">
          <th mat-header-cell *matHeaderCellDef> Matrícula </th>
          <td mat-cell *matCellDef="let taxi"> {{taxi.matricula}} </td>
        </ng-container>

        <ng-container matColumnDef="anoCompra">
          <th mat-header-cell *matHeaderCellDef> Ano de Compra </th>
          <td mat-cell *matCellDef="let taxi"> {{taxi.anoCompra}} </td>
        </ng-container>

        <ng-container matColumnDef="marca">
          <th mat-header-cell *matHeaderCellDef> Marca </th>
          <td mat-cell *matCellDef="let taxi"> {{taxi.marca}} </td>
        </ng-container>

        <ng-container matColumnDef="modelo">
          <th mat-header-cell *matHeaderCellDef> Modelo </th>
          <td mat-cell *matCellDef="let taxi"> {{taxi.modelo}} </td>
        </ng-container>

        <ng-container matColumnDef="conforto">
          <th mat-header-cell *matHeaderCellDef> Nível de Conforto </th>
          <td mat-cell *matCellDef="let taxi"> {{taxi.conforto}} </td>
        </ng-container>

        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef> Data de Registo </th>
          <td mat-cell *matCellDef="let taxi"> {{taxi.createdAt | date:'dd/MM/yyyy'}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div class="no-data" *ngIf="!isLoading && taxis.length === 0">
        <p>Não existem táxis registrados.</p>
        <button mat-raised-button color="primary" routerLink="/add-taxi">
          <mat-icon>add</mat-icon>
          Adicionar Táxi
        </button>
      </div>
    </mat-card-content>
    <mat-card-actions *ngIf="taxis.length > 0">
      <button mat-raised-button color="primary" routerLink="/add-taxi">
        <mat-icon>add</mat-icon>
        Adicionar Táxi
      </button>
    </mat-card-actions>
  </mat-card>
</div>
