<div class="dashboard-container" *ngIf="motorista">
    <div class="dashboard-header">
      <div class="avatar-circle">{{ motorista.nome.charAt(0) }}</div>
      <div class="header-info">
        <h2>Painel do Motorista</h2>
        <h3>Bem-vindo, <span class="motorista-nome">{{ motorista.nome }}</span>!</h3>
        <p class="motorista-nif">NIF: {{ motorista.nif }}</p>
      </div>
    </div>
    <div class="panels">
      <div class="panel">
        <div class="actions-grid">
          <button class="action-button" routerLink="/requisitar-taxi-turno">
            <i class="fa fa-taxi"></i>Requisitar Táxi para Turno
          </button>
          <button class="action-button" routerLink="/list-turnos">
            <i class="fa fa-calendar"></i>Ver os meus turnos
          </button>
        </div>
      </div>
      <div class="panel">
        <div class="actions-grid">
          <button class="action-button" routerLink="/travel-register">
            <i class="fa fa-clipboard-list"></i>Registar Viagem com Clientes
          </button>
          <button class="action-button" routerLink="/motorista-minhas-viagens">
            <i class="fa fa-road"></i>Ver as minhas Viagens
          </button>
        </div>
      </div>
    </div>
    <button class="logout-button" (click)="logout()">
      <i class="fa fa-sign-out-alt"></i>Sair (Logout)
    </button>
  </div>
  <div *ngIf="!motorista" class="loading-message">
    <div class="spinner"></div>
    <p>A carregar dados do motorista ou não está autenticado...</p>
    <p><a routerLink="/motorista-login">Ir para Login</a></p>
  </div>
