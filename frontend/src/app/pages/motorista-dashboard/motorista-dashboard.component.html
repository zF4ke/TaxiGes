<div class="dashboard-container" *ngIf="motorista">
    <h2>Painel do Motorista</h2>
    <h3>Bem-vindo, {{ motorista.nome }}!</h3>
    <p>(NIF: {{ motorista.nif }})</p>
    <div class="actions-grid">
      <button class="action-button" (click)="navigateTo('requisitar-taxi')">
        Requisitar Táxi para Turno
      </button>
      <button class="action-button" routerLink="/pedidos">
        Ver Pedidos de Táxi
      </button>
      <button class="action-button" (click)="navigateTo('registar-viagem')">
        Registar Viagem com Clientes
      </button>
      <button class="action-button" (click)="navigateTo('emitir-fatura')">
        Emitir Fatura
      </button>
    </div>
  
    <button class="logout-button" (click)="logout()">Sair (Logout)</button>
  </div>
  
  <div *ngIf="!motorista" class="loading-message">
    <p>A carregar dados do motorista ou não está autenticado...</p>
    <p><a routerLink="/motorista-login">Ir para Login</a></p>
  </div>
